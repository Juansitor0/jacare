<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jacaré Inventory</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #111827;
            --green: #22c55e;
            --green-dark: #16a34a;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2933;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f172a, #020617);
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: linear-gradient(180deg, #020617, #020617) padding-box,
                        linear-gradient(120deg, transparent, var(--green), transparent) border-box;
            border: 1px solid transparent;
            border-radius: 14px;
            width: 420px;
            padding: 32px;
            box-shadow: 0 0 40px rgba(34,197,94,.15);
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--green), #4ade80);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            font-weight: bold;
            font-size: 22px;
            box-shadow: 0 0 15px rgba(34,197,94,.6);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: .5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .upload {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: .2s;
            margin-bottom: 24px;
        }

        .upload:hover {
            border-color: var(--green);
            background: rgba(34,197,94,.05);
        }

        input[type="file"] {
            display: none;
        }

        label {
            cursor: pointer;
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            background: #020617;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
        }

        .file-hint {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .filter-options {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-label {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .radio-group {
            display: flex;
            gap: 16px;
            background: rgba(31, 41, 51, 0.5);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .radio-option input {
            accent-color: var(--green);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--green), #4ade80);
            color: #020617;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            box-shadow: 0 0 18px rgba(34,197,94,.45);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 28px rgba(34,197,94,.75);
        }

        footer {
            margin-top: 22px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">🐊</div>
            <div class="logo-text">Jacaré</div>
        </div>

        <div class="subtitle">
            Inventory Processor • Network & Telecom
        </div>

        <form action="/process" method="post" enctype="multipart/form-data">
            <div class="upload">
                <label for="file">Selecionar arquivo ZIP</label>
                <input id="file" name="file" type="file" required>
                <div class="file-hint">
                    Aceita apenas inventário compactado (.zip)
                </div>
            </div>

            <div class="filter-options">
                <div class="filter-label">Tipo de Equipamento:</div>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="board_type" value="UBBP" checked>
                        UBBP
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="board_type" value="AIRU">
                        RADIUS (AIRU)
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="board_type" value="BOTH">
                        Ambos
                    </label>
                </div>
            </div>

            <button type="submit">Processar Inventário</button>
        </form>

        <footer>
            Jacaré • Engine de processamento inteligente
        </footer>
    </div>

</body>
</html>
